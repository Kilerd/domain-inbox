name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Worker typecheck
        run: pnpm --filter @domain-inbox/worker run typecheck

      - name: Worker tests
        run: pnpm --filter @domain-inbox/worker run test

      - name: Web typecheck
        run: pnpm --filter @domain-inbox/web exec tsc -b

      - name: Web build
        run: pnpm --filter @domain-inbox/web run build
